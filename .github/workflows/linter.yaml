name: Linting

on: push

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install tools
        run: sudo apt-get --yes install stow shellcheck shfmt fd-find
      - name: Install just
        run: sudo snap install just --classic
      - name: Stow version
        run: stow --version
      - name: Make .config and .local/bin dir in $HOME
        run: mkdir -p /home/runner/.config /home/runner/.local/bin
      - name: Install the dotfiles
        run: stow -v --dotfiles --adopt --target /home/runner .
      - name: Restore repo=
        run: git restore .
      - name: pwd
        run: pwd
      - name: Run justfile
        run: just
