name: Linting

on: push

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install tools
        run: sudo apt-get --yes install shellcheck shfmt fd-find
      - name: Install just
        run: sudo snap install just --classic
      - name: Download stow from Debian
        run: cd ~ && wget http://ftp.us.debian.org/debian/pool/main/s/stow/stow_2.4.1-2_all.deb && sudo dpkg -i stow_2.4.1-2_all.deb
      - name: Stow version
        run: stow --version
      - name: Make .config and .local/bin dir in $HOME
        run: mkdir -p /home/runner/.config /home/runner/.local/bin
      - name: Install the dotfiles
        run: stow -v --dotfiles --adopt --target /home/runner .
      - name: Restore repo=
        run: git restore .
      - name: pwd
        run: pwd
      - name: Run justfile
        run: just
